# Job discovery pipeline configuration

# Model used for the single extract+score AI call per new offer.
# Kept cheap on purpose: the task is bounded and the volume is high.
model: claude-haiku-4-5

# Max tokens for the scoring response.
max_tokens: 2048

# Profile language used as the canonical reference when scoring (en/es/fr).
profile_language: en

# Offers with score >= threshold are flagged as `recommended` and shown by
# default in the web UI. Everything is still stored regardless of score.
score_threshold: 60

# Fetching: how long to wait for a page (seconds) before giving up.
fetch_timeout: 30

# Web UI server.
web:
  host: 127.0.0.1
  port: 8000

# Configured career/search-page sources (Phase 2.1). Each entry is a company
# search/listing page with filters (keywords, location, etc.) already baked
# into the URL, so the page lists only relevant offers.
#
# `link_selector` is a CSS selector matching the <a> tags that link to an
# individual offer on that listing page. It is site-specific — inspect the
# page in a browser (right-click an offer title -> Inspect) to find one.
# If omitted, a best-effort URL pattern is used instead (less reliable).
#
# Example:
# sources:
#   - name: "Airbus — Embedded Software (Toulouse)"
#     url: "https://www.airbus.com/en/careers/search?keywords=embedded&location=toulouse"
#     link_selector: "a[href*='/jobs/']"
#   - name: "NXP — Internships (Toulouse)"
#     url: "https://nxp.wd3.myworkdayjobs.com/fr-FR/careers?locations=98d67abaaa8a100fa633b715bb949297&q=embedded"
#     link_selector: "a[data-automation-id='jobTitle']"
sources:
  - name: "Siemens — Filtered search (FR)"
    url: "https://jobs.siemens.com/fr_FR/externaljobs/SearchJobs/?42386=%5B812134%5D&42386_format=17546&42389=%5B102117%2C102127%5D&42389_format=17549&listFilterMode=1&folderRecordsPerPage=6&"
    link_selector: "a.link[href*='/JobDetail/']"
  - name: "NXP — Internships (Toulouse)"
    url: "https://nxp.wd3.myworkdayjobs.com/fr-FR/careers?locations=98d67abaaa8a100fa633b715bb949297&q=embedded"
    link_selector: "a[data-automation-id='jobTitle']"

# Email-alert ingestion (Phase 2.2). Disabled until implemented.
email:
  enabled: false
