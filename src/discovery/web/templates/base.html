<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Job Discovery{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header>
    <nav class="nav">
      <a href="/" class="brand">🔎 Job Discovery</a>
      <a href="/applications" class="nav-link">📋 Applications</a>
      <a href="/linkedin" class="nav-link">🔗 LinkedIn</a>
    </nav>
    <form class="run-form" hx-post="/run" hx-target="#flash" hx-swap="innerHTML">
      <button type="submit" class="btn btn-run">Run search now</button>
    </form>
  </header>

  <div id="flash" class="flash"></div>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
